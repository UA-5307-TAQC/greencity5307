name: PR Lint and Tests

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]

permissions:
  pull-requests: write
  checks: write
  contents: write

jobs:
  lint:
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run pylint
        run: pylint .

  tests:
    name: Run ${{ matrix.test_type }}
    if: github.event.pull_request.draft == false || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        test_type: [pytest, behave]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        id: run-tests
        run: |
          set +e

          if [ "${{ matrix.test_type }}" = "pytest" ]; then
            pytest -v
          else
            behave -f
          fi

          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "Exit code: $EXIT_CODE"
          exit 0
        env:
          BASE_UI_URL: ${{ secrets.BASE_UI_URL }}
          BASE_API_URL: ${{ secrets.BASE_API_URL }}
          BASE_USER_API_URL: ${{ secrets.BASE_USER_API_URL }}
          IMPLICITLY_WAIT: ${{ secrets.IMPLICITLY_WAIT }}
          EXPLICITLY_WAIT: ${{ secrets.EXPLICITLY_WAIT }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          USER_NAME: ${{ secrets.USER_NAME }}
          BROWSER_LANG: ${{ secrets.BROWSER_LANG }}

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.test_type }}
          path: allure-results

  report:
    runs-on: ubuntu-latest
    needs: tests
    if: always()

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          path: allure-results-merged

      - name: Merge Allure results
        run: |
          mkdir allure-results
          find allure-results-merged -type f -name "*.json" -exec cp {} allure-results \;

      - name: Get Allure history
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
        continue-on-error: true

      - name: Generate Allure report
        id: allure-report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          subfolder: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'main' }}

      - name: Fix ownership
        run: sudo chown -R $USER:$USER allure-history

      - name: Generate index.html
        run: |
          REPORT_DIR="allure-history"
          INDEX_FILE="$REPORT_DIR/index.html"

          echo "<!DOCTYPE html>
          <html>
          <head>
            <meta charset='UTF-8'>
            <title>Allure Reports</title>
          </head>
          <body>
          <h1>📊 Allure Reports</h1>
          <ul>" > $INDEX_FILE

          if [ -d "$REPORT_DIR/main" ]; then
            echo "<li><a href='./main/'>main</a></li>" >> "$INDEX_FILE"
          fi

          find "$REPORT_DIR" -maxdepth 1 -type d -name "pr-*" \
            | sort -r \
            | while read dir; do
              name=$(basename "$dir")
              echo "<li><a href='./$name/'>$name</a></li>" >> "$INDEX_FILE"
            done

          echo "</ul></body></html>" >> "$INDEX_FILE"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Comment PR with report link
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            📊 **Allure Test Report for PR-${{ github.event.number }}**
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-${{ github.event.number }}/
          comment_tag: allure-report-link

[pytest]
pythonpath = .
addopts = --alluredir allure-results --clean-alluredir
markers =
    ui: mark a test as a UI test.
    api: mark a test as an API test.
    api_user: mark a test as an API test related to user operations.
# Parallel execution with pytest-xdist:
#   Run UI and API suites concurrently using process-based workers.
#   Each worker gets its own browser instance (driver fixture is function-scoped).
#   Example: pytest -n auto -m ui        -> parallelise all UI tests
#            pytest -n 4  -m "api or api_user" -> 4 workers for API tests
#   The --dist=loadscope option groups tests by module so that fixtures with
#   broader scopes are not shared across workers (recommended for UI tests):
#            pytest -n auto --dist=loadscope

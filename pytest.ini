[pytest]
pythonpath = .
addopts = --alluredir allure-results --clean-alluredir
markers =
    ui: mark a test as a UI test.
    api: mark a test as an API test.
    api_user: mark a test as an API test related to user operations.

# Parallel execution with pytest-xdist
# Run all tests across N workers (auto-detect CPU count):
#   pytest -n auto
# Distribute tests so that all tests in the same module stay on one worker
# (avoids session-scoped fixture duplication and shared-state collisions):
#   pytest -n auto --dist=loadscope
# Use the --dist=loadfile strategy when module-level isolation is enough
# and you want finer control:
#   pytest -n auto --dist=loadfile

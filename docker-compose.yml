services:
  taqc-tests:
    build: .
    container_name: greencity_tests
    env_file:
      - .env
    volumes:
      - ./allure-results:/app/allure-results
    environment:
      - BROWSER=chrome
      - HEADLESS=true
      - CHROME_OPTIONS=--no-sandbox,--disable-dev-shm-usage,--headless
    command: >
      sh -c "rm -rf allure-results/* && (behave -f allure_behave.formatter:AllureFormatter -o allure-results tests/bdd/features || true)"
version: '3.8'

services:
  taqc-tests:
    build: .
    container_name: greencity_tests
    # Прокидаємо volume для збереження Allure-звітів на хост-машину (⭐)
    volumes:
      - ./allure-results:/app/allure-results
    environment:
      - BROWSER=chrome
      - HEADLESS=true
    # Запускаємо тести з генерацією Allure-репорту
    command: behave -f allure_behave.formatter:AllureFormatter -o allure-results